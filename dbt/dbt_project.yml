name: "pactravel_dwh"
version: "1.0.0"
config-version: 2

profile: "pactravel_dwh"

model-paths: ["models"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests"]
clean-targets: ["target", "dbt_packages"]

models:
  pactravel_dwh:
    +persist_docs:
      relation: true
      columns: true

    staging:
      +materialized: view
      +schema: staging

    marts:
      +materialized: table
      +schema: final

snapshots:
  pactravel_dwh:
    +schema: snapshots